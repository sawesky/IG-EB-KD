experiment_name: hifar_resnet56_teacher
mode: ce
seed: 42

data:
  dataset: cifar100
  root: data
  batch_size: 256
  num_workers: 2
  val_size: 0.1

model:
  name: cifar_resnet
  depth: 56
  base_channels: 16
  num_classes: 100

train:
  epochs: 200
  patience: 30
  lr: 0.0005
  weight_decay: 0.0005
  scheduler:
    name: cosine
    t_max: 100
    min_lr: 0.00001

extensions:
  fisher_alpha: 0.0
  energy_beta: 0.0
  param_fisher_gamma: 0.0
  grad_field_delta: 0.0

eval:
  ece_bins: 15

save:
  checkpoint_path: checkpoints/hifar_resnet56_teacher.pt
  metrics_path: results/hifar_resnet56_teacher.csv
experiment_name: mnist_student_ce
mode: ce
seed: 42

data:
  root: data
  batch_size: 128
  num_workers: 2
  val_size: 0.2

model:
  name: lenet
  channels1: 8
  channels2: 16
  hidden: 64

train:
  epochs: 50
  patience: 5
  lr: 0.001
  weight_decay: 0.0001

eval:
  ece_bins: 15

save:
  checkpoint_path: checkpoints/mnist_student_ce.pt
  metrics_path: results/mnist_student_ce.csv

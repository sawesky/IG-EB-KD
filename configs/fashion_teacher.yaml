experiment_name: fashion_teacher
mode: ce
seed: 42

data:
  dataset: fashion_mnist
  root: data
  batch_size: 512
  num_workers: 0
  val_size: 0.2

model:
  name: lenet
  channels1: 32
  channels2: 64
  hidden: 128

train:
  epochs: 100
  patience: 5
  lr: 0.001
  weight_decay: 0.0001

extensions:
  fisher_alpha: 0.0
  energy_beta: 0.0
  param_fisher_gamma: 0.0
  grad_field_delta: 0.0

eval:
  ece_bins: 15

save:
  checkpoint_path: checkpoints/fashion_teacher.pt
  metrics_path: results/fashion_teacher.csv
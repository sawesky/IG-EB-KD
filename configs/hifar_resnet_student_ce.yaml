experiment_name: hifar_resnet20_student_ce
mode: ce
seed: 42

data:
  dataset: cifar100
  root: data
  batch_size: 256
  num_workers: 2
  val_size: 0.2

model:
  name: cifar_resnet
  depth: 20
  base_channels: 16
  num_classes: 100

train:
  epochs: 300
  patience: 30
  lr: 0.0005
  weight_decay: 0.0001

extensions:
  fisher_alpha: 0.0
  energy_beta: 0.0
  param_fisher_gamma: 0.0
  grad_field_delta: 0.0

eval:
  ece_bins: 15

save:
  checkpoint_path: checkpoints/hifar_resnet20_student_ce.pt
  metrics_path: results/hifar_resnet20_student_ce.csv
experiment_name: fashion_student_kd_fisher_energy
mode: kd
seed: 42

data:
  dataset: fashion_mnist
  root: data
  batch_size: 512
  num_workers: 0
  val_size: 0.2

model:
  name: lenet
  channels1: 8
  channels2: 16
  hidden: 64

teacher:
  checkpoint_path: checkpoints/fashion_teacher.pt
  model:
    name: lenet
    channels1: 32
    channels2: 64
    hidden: 128

train:
  epochs: 100
  patience: 5
  lr: 0.001
  weight_decay: 0.0001

kd:
  temperature: 1.5
  lambda_kd: 0.3

extensions:
  fisher_alpha: 0.00001
  energy_beta: 0.01
  param_fisher_gamma: 0.0
  grad_field_delta: 0.0

eval:
  ece_bins: 15

save:
  checkpoint_path: checkpoints/fashion_student_kd_fisher_energy.pt
  metrics_path: results/fashion_student_kd_fisher_energy.csv